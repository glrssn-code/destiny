<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作战地图</title>
    <!-- v2.1 2026-05-16 -->
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --border-gold: #8b7355;
            --border-gold-light: #c4a66a;
            --border-gold-dark: #5c4425;
            --text-primary: #d4c5a9;
            --text-secondary: #a89474;
            --text-bright: #f0e6d3;
            --accent: #d4a843;
            --admin-active: #c0392b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0d0d0d;
            font-family:'Georgia','Noto Serif SC',serif;
            overflow:hidden;
            height:100vh; width:100vw;
            user-select:none; -webkit-user-select:none;
        }
        .app-container {
            display:grid;
            grid-template-rows:52px 1fr 72px;
            grid-template-columns: clamp(180px, 16vw, 280px) 1fr clamp(180px, 16vw, 280px);
            grid-template-areas:
                'top-left    top-bar    top-right'
                'left-panel  map-area   right-panel'
                'bottom-left bottom-bar bottom-right';
            height:100vh; width:100vw;
            background:#111;
        }
        .top-bar { grid-area:top-bar; background:linear-gradient(180deg,#2a2218,#1e1a12); border-bottom:2px solid var(--border-gold); display:flex; align-items:center; padding:0 15px; gap:15px; box-shadow:0 2px 8px rgba(0,0,0,0.5); z-index:10; flex-wrap:wrap; }
        .top-bar .title-area { display:flex; align-items:center; gap:10px; }
        .top-bar .icon-circle { width:30px; height:30px; border-radius:50%; border:2px solid var(--border-gold); background:radial-gradient(circle at 35% 35%,#3d3020,#1a140e); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:14px; }
        .top-bar .main-title { color:var(--text-bright); font-size:16px; font-weight:bold; letter-spacing:2px; }
        .top-stats { display:flex; gap:20px; margin-left:auto; align-items:center; flex-wrap:wrap; color:var(--text-primary); font-size:13px; }
        .stat-item { display:flex; align-items:center; gap:6px; padding:4px 8px; border-radius:3px; white-space:nowrap; }
        .stat-label { color:var(--text-secondary); font-size:11px; letter-spacing:1px; }
        .stat-value { color:var(--text-bright); font-weight:bold; }
        .focus-slider { width:80px; accent-color:var(--accent); }
        .top-left-corner, .top-right-corner, .bottom-left, .bottom-right { background:linear-gradient(180deg,#2a2218,#1e1a12); border-bottom:2px solid var(--border-gold); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.5); z-index:10; padding:0 8px; }
        .top-left-corner { grid-area:top-left; border-right:1px solid var(--border-gold-dark); }
        .top-right-corner { grid-area:top-right; border-left:1px solid var(--border-gold-dark); }
        .bottom-left { grid-area:bottom-left; border-top:2px solid var(--border-gold); border-right:1px solid var(--border-gold-dark); justify-content:flex-start; }
        .bottom-right { grid-area:bottom-right; border-top:2px solid var(--border-gold); border-left:1px solid var(--border-gold-dark); justify-content:flex-end; }
        .left-panel { grid-area:left-panel; background:linear-gradient(90deg,#1a1610,#1e1a14); border-right:2px solid var(--border-gold); display:flex; flex-direction:column; z-index:8; overflow:hidden; }
        .army-list-container { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; min-height:0; scrollbar-width:thin; scrollbar-color:#5c4425 #1a1610; }
        .army-list-container::-webkit-scrollbar { width:8px; }
        .army-list-container::-webkit-scrollbar-track { background:#1a1610; border-radius:4px; }
        .army-list-container::-webkit-scrollbar-thumb { background:#5c4425; border-radius:4px; }
        .army-list-container::-webkit-scrollbar-thumb:hover { background:#8b7355; }
        .army-card { border:1px solid var(--border-gold-dark); border-radius:3px; padding:12px 10px; background:rgba(0,0,0,0.3); display:flex; flex-direction:column; justify-content:center; cursor:pointer; transition:all 0.2s; min-height:100px; }
        .army-card:hover { border-color:var(--border-gold-light); background:rgba(139,115,85,0.2); }
        .army-card.selected { border-color:var(--accent); box-shadow:0 0 12px rgba(212,168,67,0.5); background:rgba(212,168,67,0.1); }
        .army-color { width:16px; height:16px; border-radius:3px; border:1px solid rgba(255,255,255,0.3); margin-right:6px; display:inline-block; vertical-align:middle; }
        .army-name { color:var(--text-bright); font-weight:bold; font-size:14px; letter-spacing:1px; }
        .army-note { color:var(--text-secondary); font-size:10px; margin-top:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .army-time { color:var(--text-secondary); font-size:10px; margin-top:4px; }
        .add-army-btn { border:1px dashed var(--border-gold); border-radius:3px; padding:8px; text-align:center; cursor:pointer; color:var(--text-secondary); font-size:12px; margin:4px 8px; transition:0.2s; }
        .add-army-btn:hover { border-color:var(--accent); color:var(--accent); }
        .right-panel { grid-area:right-panel; background:linear-gradient(270deg,#1a1610,#1e1a14); border-left:2px solid var(--border-gold); padding:8px; display:flex; flex-direction:column; gap:6px; z-index:8; min-height:0; }
        .panel-section { border:1px solid var(--border-gold-dark); border-radius:3px; padding:10px; background:rgba(0,0,0,0.2); flex:1; display:flex; flex-direction:column; gap:8px; overflow-y:auto; min-height:0; }
        .section-title { color:var(--accent); font-size:12px; font-weight:bold; letter-spacing:2px; text-align:center; border-bottom:1px solid var(--border-gold-dark); padding-bottom:5px; }
        .prop-editor { display:flex; flex-direction:column; gap:8px; color:var(--text-primary); font-size:11px; }
        .prop-editor input { background:#1a1814; border:1px solid var(--border-gold-dark); color:var(--text-bright); padding:5px 6px; font-family:inherit; font-size:11px; border-radius:3px; width:100%; outline:none; }
        .prop-editor input:disabled { opacity:0.5; cursor:not-allowed; }
        .color-grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:4px; margin-top:4px; }
        .color-swatch { width:20px; height:20px; border-radius:3px; cursor:pointer; border:1px solid rgba(255,255,255,0.2); transition:0.2s; }
        .color-swatch:hover { border-color:var(--accent); transform:scale(1.2); }
        .btn { padding:6px 12px; border:1px solid var(--border-gold); background:linear-gradient(180deg,#3d3020,#2a1f14); color:var(--text-primary); cursor:pointer; font-family:inherit; font-size:12px; letter-spacing:1px; border-radius:3px; transition:0.2s; white-space:nowrap; }
        .btn:hover { border-color:var(--border-gold-light); background:linear-gradient(180deg,#4d3d28,#352718); color:var(--text-bright); }
        .btn-accent { border-color:var(--accent); color:var(--accent); font-weight:bold; }
        .btn-admin { border-color:#c0392b; color:#e74c3c; font-weight:bold; background:linear-gradient(180deg,#4a2020,#2a1010); }
        .btn-admin.active { border-color:#e74c3c; background:#3a1a1a; box-shadow:0 0 12px rgba(231,76,60,0.4); }
        .btn-highlight { border-color:#f0c860; box-shadow:0 0 10px rgba(240,200,96,0.5); }
        .btn-danger { border-color:#c0392b; color:#e74c3c; }
        .btn-success { border-color:#27ae60; color:#2ecc71; }
        .btn-exit { border-color:#e67e22; color:#e67e22; font-weight:bold; background:linear-gradient(180deg,#5a3a1a,#3a2010); }
        .btn-stats { border-color:#3498db; color:#3498db; font-weight:bold; background:linear-gradient(180deg,#2a4a5a,#1a2a3a); }
        .bottom-bar { grid-area:bottom-bar; background:linear-gradient(0deg,#1e1810,#221d14); border-top:2px solid var(--border-gold); display:flex; align-items:center; padding:0 15px; gap:10px; box-shadow:0 -2px 8px rgba(0,0,0,0.5); z-index:10; }
        .coords-display { color:var(--text-secondary); font-size:11px; padding:4px 8px; border:1px solid var(--border-gold-dark); border-radius:3px; background:rgba(0,0,0,0.25); min-width:130px; text-align:center; }
        .map-area { grid-area:map-area; position:relative; overflow:hidden; background:#0a0907; cursor:grab; z-index:5; }
        .map-area canvas { display:block; position:absolute; top:0; left:0; }
        .hex-tooltip { position:fixed; pointer-events:none; z-index:1000; background:linear-gradient(180deg,#2a2218,#1a140e); border:2px solid var(--border-gold); border-radius:4px; padding:8px 12px; color:var(--text-bright); font-size:12px; opacity:0; transition:opacity 0.12s; white-space:nowrap; }
        .hex-tooltip.visible { opacity:1; }
        .admin-indicator { position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(192,57,43,0.85); color:white; padding:4px 16px; border-radius:3px; font-size:12px; letter-spacing:2px; z-index:25; pointer-events:none; border:1px solid #e74c3c; display:none; }
        .admin-indicator.visible { display:block; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; display:flex; align-items:center; justify-content:center; }
        .modal-content { background:#1e1a14; border:2px solid var(--border-gold); border-radius:6px; padding:25px; max-width:500px; width:90%; color:var(--text-primary); font-family:inherit; }
        .summary-row { display:flex; justify-content:space-between; margin:8px 0; }
        .btn-confirm { display:block; margin:20px auto 0; padding:10px 30px; background:var(--accent); color:#1a140e; border:none; cursor:pointer; font-weight:bold; }
        #imageFileInput, #backupFileInput { display:none; }
        .overall-stats { color:var(--text-primary); font-size:11px; line-height:1.6; }
        .overall-stats .stat-row { display:flex; justify-content:space-between; margin:3px 0; }
        /* 数据展示弹窗样式 */
        .data-modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:3000; display:flex; align-items:center; justify-content:center; }
        .data-modal { background:linear-gradient(180deg,#252015,#1a1510); border:2px solid var(--border-gold); border-radius:8px; padding:20px; width:90%; max-width:900px; max-height:90vh; overflow-y:auto; color:var(--text-primary); font-family:inherit; }
        .data-modal h2 { color:var(--accent); text-align:center; margin-bottom:15px; letter-spacing:3px; font-size:18px; }
        .data-modal h3 { color:var(--text-bright); font-size:13px; margin:12px 0 8px; border-bottom:1px solid var(--border-gold-dark); padding-bottom:4px; }
        .data-tabs { display:flex; gap:8px; margin-bottom:15px; justify-content:center; }
        .data-tab { padding:8px 20px; border:1px solid var(--border-gold); background:#2a2015; color:var(--text-secondary); cursor:pointer; border-radius:4px; font-size:12px; transition:0.2s; }
        .data-tab.active { background:var(--accent); color:#1a140e; border-color:var(--accent); font-weight:bold; }
        .data-tab:hover:not(.active) { border-color:var(--accent); color:var(--accent); }
        .stat-card { background:rgba(0,0,0,0.3); border:1px solid var(--border-gold-dark); border-radius:4px; padding:12px; display:inline-block; min-width:100px; text-align:center; margin:4px; }
        .stat-card .label { color:var(--text-secondary); font-size:10px; letter-spacing:1px; }
        .stat-card .value { color:var(--text-bright); font-size:20px; font-weight:bold; margin-top:4px; }
        .stat-card .sub { color:var(--accent); font-size:10px; }
        .chart-container { background:rgba(0,0,0,0.2); border:1px solid var(--border-gold-dark); border-radius:4px; padding:15px; margin:10px 0; }
        .chart-canvas { width:100%; height:200px; background:#1a1510; border-radius:3px; }
        .heatmap-container { display:grid; grid-template-columns: repeat(7, 1fr); gap:3px; margin:10px 0; }
        .heatmap-cell { aspect-ratio:1; border-radius:3px; min-width:20px; background:#2a2015; text-align:center; font-size:9px; color:var(--text-secondary); padding:4px 2px; }
        .heatmap-cell.level1 { background:#3a2820; }
        .heatmap-cell.level2 { background:#5a4030; }
        .heatmap-cell.level3 { background:#7a5040; }
        .heatmap-cell.level4 { background:#9a6050; }
        .heatmap-cell.level5 { background:#c07060; }
        .heatmap-label { color:var(--text-secondary); font-size:10px; text-align:center; margin-top:8px; }
        .heatmap-row { display:flex; gap:3px; margin:2px 0; align-items:center; }
        .heatmap-row-label { width:50px; font-size:10px; color:var(--text-secondary); text-align:right; padding-right:8px; }
        .close-data-btn { display:block; margin:15px auto 0; padding:10px 40px; background:var(--border-gold); color:#1a140e; border:none; cursor:pointer; font-weight:bold; font-size:13px; border-radius:4px; transition:0.2s; }
        .close-data-btn:hover { background:var(--accent); }
        .comparison-bars { display:flex; align-items:end; gap:20px; height:150px; padding:10px 0; }
        .compare-bar { display:flex; flex-direction:column; align-items:center; flex:1; }
        .compare-bar .bar { width:60px; background:linear-gradient(180deg,#4a3828,#2a1810); border:1px solid var(--border-gold-dark); border-radius:4px 4px 0 0; transition:height 0.5s; }
        .compare-bar .label { color:var(--text-secondary); font-size:10px; margin-top:6px; }
        .compare-bar .val { color:var(--text-bright); font-size:14px; font-weight:bold; margin-bottom:4px; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-left-corner"><div style="width:60%;height:1px;background:var(--border-gold);opacity:0.6;"></div></div>
    <div class="top-bar">
        <div class="title-area"><div class="icon-circle">⬡</div><span class="main-title">作战地图</span></div>
        <div class="top-stats">
            <div class="stat-item"><span class="stat-label">倒计时</span> <span class="stat-value" id="countdownDays">0</span><span class="stat-label">天</span></div>
            <div class="stat-item"><span class="stat-label">总时长</span> <span class="stat-value" id="totalHours">0.0</span><span class="stat-label">h</span></div>
            <div class="stat-item"><span class="stat-label">专注度</span><input type="range" class="focus-slider" id="focusSlider" min="0" max="100" value="50"><span class="stat-value" id="focusValue">50</span><span class="stat-label">%</span></div>
            <div class="stat-item"><span class="stat-label">精力</span> <span class="stat-value" id="energyValue">70</span></div>
            <div class="stat-item"><span class="stat-label">士气</span> <span class="stat-value" id="moraleValue">--</span></div>
        </div>
    </div>
    <div class="top-right-corner" style="justify-content:flex-end; padding-right:10px; gap:6px;">
        <button class="btn btn-stats" id="btnShowData">📊 数据</button>
        <button class="btn btn-exit" id="btnExitSystem">🚪 退出</button>
    </div>

    <div class="left-panel" id="leftPanel">
        <div class="army-list-container" id="armyListContainer"></div>
        <div class="add-army-btn" id="addArmyBtn" style="display:none;">+ 新建军种</div>
    </div>

    <div class="map-area" id="mapArea">
        <canvas id="mapCanvas"></canvas>
        <div class="admin-indicator" id="adminIndicator">⚙️ 管理员模式</div>
    </div>

    <div class="right-panel" id="rightPanel">
        <div class="panel-section" id="armyDetailSection">
            <div class="section-title">⚔️ 军队详情</div>
            <div id="armyEditor" class="prop-editor">
                <div id="overallStatsContainer" style="display:none;" class="overall-stats"></div>
                <div id="armyFormContainer">
                    <div><span class="stat-label">名称：</span><input type="text" id="editArmyName" disabled></div>
                    <div><span class="stat-label">备注：</span><input type="text" id="editArmyNote" disabled placeholder="例如：英语、数学、政治…"></div>
                    <div id="armyColorRow"><span class="stat-label">颜色：</span><div class="color-picker-wrapper" id="armyColorPicker"></div></div>
                    <div id="armyTotalTimeRow"><span class="stat-label">累计时长：</span><span id="armyTotalTime">0h</span></div>
                    <div><span class="stat-label" id="studyInputLabel">今日投入：</span><input type="number" id="todayStudyInput" min="0" step="1" value="0" disabled> <button class="btn" id="btnAddStudy" disabled>计入</button></div>
                    <div style="font-size:10px; color:var(--text-secondary);" id="armyHint">请先在左侧选择军队</div>
                </div>
            </div>
        </div>
        <div class="panel-section" id="hexDetailSection">
            <div class="section-title">🗺️ 地块详情</div>
            <div class="prop-editor">
                <div><span class="stat-label">坐标：</span><span id="detailCoords">--</span></div>
                <div><span class="stat-label">所属军队：</span><span id="detailArmy">--</span></div>
                <div><span class="stat-label">自定义名：</span><input type="text" id="detailCustomName" disabled placeholder="无"></div>
                <div id="adminColorSection" style="display:none;">
                    <span class="stat-label">属性颜色：</span>
                    <div class="color-picker-wrapper" id="adminHexColorPicker"></div>
                </div>
                <div id="battleSection" style="display:none;">
                    <div style="color:#e74c3c; font-weight:bold;">⚡ 战斗进行中</div>
                    <button class="btn btn-success" id="btnBattleWin">胜利</button>
                    <button class="btn btn-danger" id="btnBattleLose">失败</button>
                </div>
                <div id="unclaimSection" style="display:none;">
                    <button class="btn btn-danger" id="btnUnclaim">取消占领</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-left" id="bottomLeft">
        <div id="userModeBtns" style="display:flex; gap:6px;">
            <button class="btn btn-accent" id="btnImportBackup">📂 导入备份</button>
            <button class="btn" id="btnExportData">💾 导出备份</button>
        </div>
        <div id="adminModeBtns" style="display:none; gap:6px; align-items:center;">
            <button class="btn btn-accent" id="btnImportImage">📷 导入底图</button>
            <button class="btn" id="btnClearImage">🗑️ 清除底图</button>
            <button class="btn btn-danger" id="btnResetAllData" style="padding:6px 8px;font-size:11px;">!</button>
        </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
        <button class="btn" id="btnResetView">🏠 重置视图</button>
        <button class="btn" id="btnMapEdit" style="display:none;">🗺️ 地图编辑</button>
        <span class="coords-display" id="coordsDisplay">坐标: — , —</span>
        <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
            <button class="btn" id="btnZoomOut">−</button>
            <span style="color:var(--text-secondary);min-width:50px;text-align:center;" id="zoomLabel">100%</span>
            <button class="btn" id="btnZoomIn">+</button>
        </div>
    </div>

    <div class="bottom-right" id="bottomRight">
        <button class="btn btn-admin" id="btnAdminMode">🔧 管理员模式</button>
    </div>
</div>

<div class="hex-tooltip" id="hexTooltip">
    <div style="font-weight:bold;color:var(--accent);" id="tipTitle">—</div>
    <div><span style="color:var(--text-secondary);">军队：</span><span id="tipArmy">—</span></div>
    <div><span style="color:var(--text-secondary);">坐标：</span><span id="tipCoords">—</span></div>
</div>

<input type="file" id="imageFileInput" accept="image/*">
<input type="file" id="backupFileInput" accept=".json">

<!-- 数据展示弹窗 -->
<div id="dataModal" style="display:none;">
    <div class="data-modal-overlay" id="dataModalOverlay">
        <div class="data-modal">
            <h2>📊 学习数据中心</h2>
            <div class="data-tabs">
                <button class="data-tab active" data-tab="today">今日</button>
                <button class="data-tab" data-tab="week">本周</button>
                <button class="data-tab" data-tab="month">本月</button>
            </div>
            <div id="dataModalContent"></div>
            <button class="close-data-btn" id="closeDataModal">关闭</button>
        </div>
    </div>
</div>

<script>
    (() => {
        // ========== DOM 引用 ==========
        const mapArea = document.getElementById('mapArea');
        const mapCanvas = document.getElementById('mapCanvas');
        const ctx = mapCanvas.getContext('2d');
        const armyListContainer = document.getElementById('armyListContainer');
        const addArmyBtn = document.getElementById('addArmyBtn');
        const hexTooltip = document.getElementById('hexTooltip');
        const coordsDisplay = document.getElementById('coordsDisplay');
        const adminIndicator = document.getElementById('adminIndicator');
        const imageFileInput = document.getElementById('imageFileInput');
        const backupFileInput = document.getElementById('backupFileInput');
        const countdownDays = document.getElementById('countdownDays');
        const totalHoursDisplay = document.getElementById('totalHours');
        const focusSlider = document.getElementById('focusSlider');
        const focusValue = document.getElementById('focusValue');
        const energyValue = document.getElementById('energyValue');
        const moraleValue = document.getElementById('moraleValue');
        const editArmyName = document.getElementById('editArmyName');
        const editArmyNote = document.getElementById('editArmyNote');
        const armyTotalTime = document.getElementById('armyTotalTime');
        const armyTotalTimeRow = document.getElementById('armyTotalTimeRow');
        const studyInputLabel = document.getElementById('studyInputLabel');
        const todayStudyInput = document.getElementById('todayStudyInput');
        const btnAddStudy = document.getElementById('btnAddStudy');
        const armyHint = document.getElementById('armyHint');
        const detailCoords = document.getElementById('detailCoords');
        const detailArmy = document.getElementById('detailArmy');
        const detailCustomName = document.getElementById('detailCustomName');
        const battleSection = document.getElementById('battleSection');
        const btnBattleWin = document.getElementById('btnBattleWin');
        const btnBattleLose = document.getElementById('btnBattleLose');
        const adminColorSection = document.getElementById('adminColorSection');
        const unclaimSection = document.getElementById('unclaimSection');
        const btnUnclaim = document.getElementById('btnUnclaim');
        const btnAdminMode = document.getElementById('btnAdminMode');
        const userModeBtns = document.getElementById('userModeBtns');
        const adminModeBtns = document.getElementById('adminModeBtns');
        const btnMapEdit = document.getElementById('btnMapEdit');
        const zoomLabel = document.getElementById('zoomLabel');
        const btnExitSystem = document.getElementById('btnExitSystem');

        // ========== 地图参数 ==========
        const A0_WIDTH = 3370, A0_HEIGHT = 2384;

        // ========== 颜色选择器 ==========
        function createColorPicker(container, initialColor, onChange) {
            container.innerHTML = '';
            const grid = document.createElement('div'); grid.className = 'color-grid';
            FIXED_COLORS.forEach(color => {

            function highlightSwatch(c) {
                container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));

        // ========== 坐标工具 ==========
        function axialToPixel(q,r) { return { x:SQRT3*HEX_RADIUS*(q+r/2), y:1.5*HEX_RADIUS*r }; }
        function pixelToAxial(px,py) { return { q:(SQRT3/3*px - 1/3*py)/HEX_RADIUS, r:(2/3*py)/HEX_RADIUS }; }
        function axialRound(qf,rf) {
            const s = -qf - rf, rq=Math.round(qf), rr=Math.round(rf), rs=Math.round(s);
            const dq=Math.abs(rq-qf), dr=Math.abs(rr-rf), ds=Math.abs(rs-s);
            if(dq>dr && dq>ds) return { q:-rr-rs, r:rr };
            if(dr>ds) return { q:rq, r:-rq-rs };
            return { q:rq, r:rr };
        }
        function getHexAtPixel(mx,my) { const a=pixelToAxial(mx,my); return axialRound(a.q,a.r); }
        function hexKey(q,r) { return `${q},${r}`; }
        function getHexVertices(cx,cy,r) {
            const v=[];
            for(let i=0;i<6;i++) { const ang=-Math.PI/2+i*Math.PI/3; v.push({x:cx+r*Math.cos(ang), y:cy+r*Math.sin(ang)}); }
            return v;
        }
        function screenToMap(sx,sy) { const cp = Math.cos(pitchAngle); return { x:(sx-canvasWidth/2)/zoom + cameraX, y:(sy-canvasHeight/2)/(zoom*cp) + cameraY }; }

        function drawHexPath(cx, cy, radius) {
            const verts = getHexVertices(cx, cy, radius);
            ctx.beginPath(); ctx.moveTo(verts[0].x, verts[0].y);
            for (let i = 1; i < 6; i++) ctx.lineTo(verts[i].x, verts[i].y);
            ctx.closePath();
        }

        function generateHexForBounds(bounds) {
            const { minX, minY, maxX, maxY } = bounds;
            let minQ=Infinity, maxQ=-Infinity, minR=Infinity, maxR=-Infinity;
            [{x:minX,y:minY},{x:maxX,y:minY},{x:maxX,y:maxY},{x:minX,y:maxY}].forEach(c => {
                for(let dx=-HEX_W; dx<=HEX_W; dx+=HEX_W)
                    for(let dy=-HEX_H; dy<=HEX_H; dy+=HEX_H) {
                        const a = pixelToAxial(c.x+dx, c.y+dy);
                        minQ=Math.min(minQ,a.q); maxQ=Math.max(maxQ,a.q); minR=Math.min(minR,a.r); maxR=Math.max(maxR,a.r);
                    }
            });
            for(let r=Math.floor(minR)-1; r<=Math.ceil(maxR)+1; r++)
                for(let q=Math.floor(minQ)-1; q<=Math.ceil(maxQ)+1; q++) {
                    const key = hexKey(q,r);
                    if(hexData[key]) continue;
                    const center = axialToPixel(q,r);
                    if(center.x+HEX_W/2 < minX || center.x-HEX_W/2 > maxX || center.y+HEX_H/2 < minY || center.y-HEX_H/2 > maxY) continue;
                    hexData[key] = { q, r, armyId:-1, customName:'', adminColor:'', battleStartTime:null, battleArmyId:-1 };
                }
        }
        function addRegion(dir) {
            const cur = regions[selectedRegionIndex]; let nx=cur.x, ny=cur.y;
            if(dir==='left') nx-=A0_WIDTH; else if(dir==='right') nx+=A0_WIDTH; else if(dir==='up') ny-=A0_HEIGHT; else if(dir==='down') ny+=A0_HEIGHT;
            if(regions.some(r=>r.x===nx && r.y===ny)) return;
            regions.push({ x:nx, y:ny, width:A0_WIDTH, height:A0_HEIGHT, bgImage:null, bgLoaded:false });
            generateHexForBounds(getWorldBounds()); saveAllData(); render();
        }
        function getWorldBounds() {
            let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
            regions.forEach(r => { if(r.x<minX)minX=r.x; if(r.y<minY)minY=r.y; if(r.x+r.width>maxX)maxX=r.x+r.width; if(r.y+r.height>maxY)maxY=r.y+r.height; });
            return { minX, minY, maxX, maxY, width:maxX-minX, height:maxY-minY };
        }

        // ========== 日志与持久化 ==========
        function addActionLog(type, army, coords, result, extra) {
            actionLogs.push({ time: new Date().toISOString(), type, army, coords, result, extra: extra||'' });
            localStorage.setItem('actionLogs', JSON.stringify(actionLogs));

        function addStudyLog(army, hours) { studyLogs.push({ time: new Date().toISOString(), army, hours }); localStorage.setItem('studyLogs', JSON.stringify(studyLogs)); }
        function addSleepLog(hours) { studyLogs.push({ time: new Date().toISOString(), army: '睡眠', hours, type: 'sleep' }); localStorage.setItem('studyLogs', JSON.stringify(studyLogs)); }
        function saveAllData() {
            const props = {};
            for(const k in hexData) { const h=hexData[k]; props[k]={ q:h.q, r:h.r, armyId:h.armyId, customName:h.customName, adminColor:h.adminColor, battleStartTime:h.battleStartTime, battleArmyId:h.battleArmyId }; }
            localStorage.setItem('examHexData', JSON.stringify(props));
            localStorage.setItem('examArmies', JSON.stringify(armies));
            localStorage.setItem('examFocus', focusPercent);
            localStorage.setItem('examRegions', JSON.stringify(regions.map(r=>({x:r.x,y:r.y}))));
            localStorage.setItem('actionLogs', JSON.stringify(actionLogs));
            localStorage.setItem('studyLogs', JSON.stringify(studyLogs));
        }
        function loadAllData() {
            try {
                actionLogs = JSON.parse(localStorage.getItem('actionLogs') || '[]');
                studyLogs = JSON.parse(localStorage.getItem('studyLogs') || '[]');
                const reg = JSON.parse(localStorage.getItem('examRegions'));
                regions = (reg && reg.length) ? reg.map(d=>({x:d.x,y:d.y,width:A0_WIDTH,height:A0_HEIGHT,bgImage:null,bgLoaded:false})) : [{x:0,y:0,width:A0_WIDTH,height:A0_HEIGHT,bgImage:null,bgLoaded:false}];
                const a = JSON.parse(localStorage.getItem('examArmies'));
                if (a && a.length) {
                    armies = a.map(arm => ({...arm, totalMinutes: arm.totalMinutes||0, todayMinutes: arm.todayMinutes||0, isSleep: arm.isSleep||false }));
                } else {
                    // 无存储数据时使用默认军队

                }
                focusPercent = parseInt(localStorage.getItem('examFocus')) || 50;
                focusSlider.value = focusPercent; focusValue.textContent = focusPercent;
                const p = JSON.parse(localStorage.getItem('examHexData'));
                if (p) for(const k in hexData) if(p[k]) { hexData[k].armyId=p[k].armyId??-1; hexData[k].customName=p[k].customName||''; hexData[k].adminColor=p[k].adminColor||''; hexData[k].battleStartTime=p[k].battleStartTime||null; hexData[k].battleArmyId=p[k].battleArmyId??-1; }
            } catch(e) {}
        }

        function updateTotalHours() { let min = 0; armies.forEach(a => { if (!a.isSleep) min += a.totalMinutes||0; }); totalHoursDisplay.textContent = (min/60).toFixed(1); }
        function updateCountdown() { countdownDays.textContent = Math.max(0, Math.ceil((TARGET_DATE-Date.now())/86400000)); }
        setInterval(updateCountdown, 60000);

        function updateEnergy() {
            const sleepArmy = armies.find(a => a.isSleep);
            if (!sleepArmy) { energyValue.textContent = '70'; return; }
            const sleepMinutes = sleepArmy.todayMinutes || 0;
            const ideal = 480;
            let energy = 100;
            if (sleepMinutes === 0) { energy = 70; }
            else {
                const diff = sleepMinutes - ideal;
                if (diff < -30) { const shortage = Math.abs(diff); const penaltyUnits = Math.ceil(shortage / 30); energy = 100 - penaltyUnits * 20; }
                else if (diff > 60) { const excess = diff; const penaltyUnits = Math.ceil(excess / 60); energy = 100 - penaltyUnits * 20; }
                energy = Math.max(0, Math.min(100, energy));
            }
            energyValue.textContent = energy;
        }

        function renderArmyList() {
            armyListContainer.innerHTML = '';
            armies.forEach((army, idx) => {

        function updateArmyDetailPanel() {
            if (!adminMode && selectedArmyIndex === -1) {
                overallStatsContainer.style.display = 'block'; armyFormContainer.style.display = 'none';

                editArmyName.disabled = true; editArmyNote.disabled = true;
                armyTotalTimeRow.style.display = 'block'; armyTotalTime.textContent = '0h';
                studyInputLabel.textContent = '今日投入（分钟）：';

        editArmyName.oninput = () => { if(!adminMode || selectedArmyIndex<0) return; armies[selectedArmyIndex].name = editArmyName.value; renderArmyList(); saveAllData(); };
        editArmyNote.oninput = () => { if(!adminMode || selectedArmyIndex<0) return; armies[selectedArmyIndex].note = editArmyNote.value; renderArmyList(); saveAllData(); };
        btnAddStudy.onclick = () => {
            if(adminMode || selectedArmyIndex<0) return;
            const army = armies[selectedArmyIndex];
            const val = parseFloat(todayStudyInput.value);
            if(isNaN(val)||val<=0) return;
            if (army.isSleep) {
                const mins = Math.round(val * 60);
                army.todayMinutes += mins;
                addSleepLog(val);
            } else {
                const mins = Math.round(val);
                army.totalMinutes += mins;
                army.todayMinutes += mins;
                addStudyLog(army.name, mins/60);
            }
            todayStudyInput.value = 0;
            updateArmyDetailPanel(); renderArmyList(); updateTotalHours(); updateEnergy(); saveAllData();
        };

        addArmyBtn.addEventListener('click', () => { if (!adminMode) return; armies.push({ name:'新军种', note:'', color:'#cccccc', totalMinutes:0, todayMinutes:0, isSleep:false }); renderArmyList(); saveAllData(); });
        focusSlider.oninput = () => { focusPercent = parseInt(focusSlider.value); focusValue.textContent = focusPercent; localStorage.setItem('examFocus', focusPercent); };

        function startAnimation() { if(!animFrame) animFrame = requestAnimationFrame(animate); }
        function animate(now) { breathingPhase = (now%2000)/2000; render(); animFrame = requestAnimationFrame(animate); }

        function render() {
            if(!canvasWidth||!canvasHeight) return;
            const cp = Math.cos(pitchAngle);
            ctx.clearRect(0,0,canvasWidth,canvasHeight); ctx.fillStyle='#0d0c0a'; ctx.fillRect(0,0,canvasWidth,canvasHeight);
            ctx.save(); ctx.translate(canvasWidth/2,canvasHeight/2); ctx.scale(zoom,zoom); ctx.scale(1,cp); ctx.translate(-cameraX,-cameraY);
            regions.forEach(r => { if(r.bgLoaded&&r.bgImage) ctx.drawImage(r.bgImage,r.x,r.y,r.width,r.height); });
            const vw=canvasWidth/(2*zoom), vh=canvasHeight/(2*zoom*cp);
            const vl=cameraX-vw-HEX_RADIUS*2, vr=cameraX+vw+HEX_RADIUS*2, vt=cameraY-vh-HEX_RADIUS*2, vb=cameraY+vh+HEX_RADIUS*2;
            const visible = [];
            for(const k in hexData) { const h=hexData[k], p=axialToPixel(h.q,h.r); if(p.x>=vl&&p.x<=vr&&p.y>=vt&&p.y<=vb) visible.push({...h, sx:p.x, sy:p.y}); }
            if(pitchAngle>0.05) visible.sort((a,b)=>a.sy-b.sy);
            visible.forEach(hex => {
                const cx=hex.sx, cy=hex.sy;
                const army = hex.armyId>=0 && hex.armyId<armies.length ? armies[hex.armyId] : null;
                const isHovered = !mapEditMode && hoveredHex && hoveredHex.q===hex.q && hoveredHex.r===hex.r;
                const isSelected = !mapEditMode && selectedHex && selectedHex.q===hex.q && selectedHex.r===hex.r;
                const inBattle = !adminMode && hex.adminColor && hex.armyId===-1 && hex.battleStartTime;
                const battleArmy = inBattle && hex.battleArmyId>=0 && hex.battleArmyId<armies.length ? armies[hex.battleArmyId] : null;
                const breath = 0.5+0.5*Math.sin(breathingPhase*Math.PI*2);

                if(hex.adminColor && !inBattle) { ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle=hex.adminColor; drawHexPath(cx,cy,HEX_RADIUS-0.5); ctx.fill(); ctx.restore(); }
                if(inBattle && battleArmy) { ctx.save(); ctx.globalAlpha=0.5+0.5*breath; ctx.fillStyle=hex.adminColor; drawHexPath(cx,cy,HEX_RADIUS-0.5); ctx.fill(); ctx.restore(); }
                if(army) { ctx.save(); ctx.globalAlpha=0.7; ctx.fillStyle=army.color; drawHexPath(cx,cy,HEX_RADIUS-0.5); ctx.fill(); ctx.restore(); }
                else if(!inBattle && (isHovered||isSelected)) { ctx.save(); ctx.globalAlpha=0.25; ctx.fillStyle='#f0e6d3'; drawHexPath(cx,cy,HEX_RADIUS-0.5); ctx.fill(); ctx.restore(); }

                ctx.save(); ctx.globalAlpha=1;
                ctx.strokeStyle = isSelected ? (adminMode?'#e74c3c':'#ffd700') : (isHovered?'#f0c860' : (inBattle && battleArmy ? battleArmy.color : 'rgba(180,150,100,0.55)'));
                ctx.lineWidth = isSelected?2.5:(isHovered||inBattle?2:0.9);
                ctx.lineJoin = 'round';
                if(inBattle && battleArmy) { ctx.shadowColor = battleArmy.color; ctx.shadowBlur = 6+4*breath; }
                drawHexPath(cx,cy,HEX_RADIUS-0.5); ctx.stroke();
                ctx.restore();
            });
            if(adminMode && mapEditMode && selectedRegionIndex>=0) {
                const r = regions[selectedRegionIndex]; ctx.strokeStyle='#e74c3c'; ctx.lineWidth=4; ctx.strokeRect(r.x,r.y,r.width,r.height);
                const btnSize=100;
                const drawPlus=(cx,cy)=>{ ctx.fillStyle='#e74c3c'; ctx.beginPath(); ctx.arc(cx,cy,btnSize/2,0,Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.fillRect(cx-4,cy-20,8,40); ctx.fillRect(cx-20,cy-4,40,8); };
                const hl = regions.some(reg=>reg.x+reg.width===r.x&&reg.y===r.y), hr = regions.some(reg=>reg.x===r.x+r.width&&reg.y===r.y), hu = regions.some(reg=>reg.y+reg.height===r.y&&reg.x===r.x), hd = regions.some(reg=>reg.y===r.y+r.height&&reg.x===r.x);
                if(!hl) drawPlus(r.x-btnSize/2,r.y+r.height/2);
                if(!hr) drawPlus(r.x+r.width+btnSize/2,r.y+r.height/2);
                if(!hu) drawPlus(r.x+r.width/2,r.y-btnSize/2);
                if(!hd) drawPlus(r.x+r.width/2,r.y+r.height+btnSize/2);
            }
            ctx.restore(); zoomLabel.textContent = Math.round(zoom*100)+'%';
        }

        function getMousePos(e) { const r=mapCanvas.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
        function isMouseInsideCanvas(pos) { return pos.x>=0&&pos.x<=canvasWidth&&pos.y>=0&&pos.y<=canvasHeight; }

        mapCanvas.addEventListener('mousedown', e => {
            const pos = getMousePos(e);
            if(e.button===0) {
                if(adminMode && mapEditMode) {
                    const mp = screenToMap(pos.x,pos.y); const r = regions[selectedRegionIndex];
                    if(r) {
                        const checkPlus=(cx,cy)=>Math.hypot(mp.x-cx,mp.y-cy)<50;
                        const lx=r.x-50,ly=r.y+r.height/2,rx=r.x+r.width+50,ry=r.y+r.height/2,ux=r.x+r.width/2,uy=r.y-50,dx=r.x+r.width/2,dy=r.y+r.height+50;
                        if(!regions.some(reg=>reg.x+reg.width===r.x&&reg.y===r.y)&&checkPlus(lx,ly)){addRegion('left');return;}
                        if(!regions.some(reg=>reg.x===r.x+r.width&&reg.y===r.y)&&checkPlus(rx,ry)){addRegion('right');return;}
                        if(!regions.some(reg=>reg.y+reg.height===r.y&&reg.x===r.x)&&checkPlus(ux,uy)){addRegion('up');return;}
                        if(!regions.some(reg=>reg.y===r.y+r.height&&reg.x===r.x)&&checkPlus(dx,dy)){addRegion('down');return;}
                        for(let i=0;i<regions.length;i++) if(mp.x>=regions[i].x&&mp.x<=regions[i].x+regions[i].width&&mp.y>=regions[i].y&&mp.y<=regions[i].y+regions[i].height){selectedRegionIndex=i;render();return;}
                    }

            if(isLeftDragging) { const cp=Math.cos(pitchAngle); cameraX=dragStartCamX-(pos.x-dragStartX)/zoom; cameraY=dragStartCamY-(pos.y-dragStartY)/(zoom*cp); clampCamera(); render(); return; }

        function getStudyLogData(days) {
            const now = new Date();
            const logs = [];
            for(let i=days-1;i>=0;i--){
                const d = new Date(now);
                d.setDate(d.getDate()-i);
                const dayStr = d.toISOString().split('T')[0];
                let totalMin = 0;
                for(const entry of (studyLogs||[])){
                    const entryDay = entry.time.split('T')[0];
                    if(entryDay===dayStr) totalMin += (entry.hours||0)*60;
                }
                logs.push({date:d, dayStr, minutes:totalMin});
            }
            return logs;
        }
        function getRecentEnergy(days) {
            const now = new Date();
            const data = [];
            for(let i=days-1;i>=0;i--){
                const d = new Date(now);
                d.setDate(d.getDate()-i);
                data.push({date:d, value:60+Math.floor(Math.random()*30)});
            }
            return data;
        }

            let periodLabel = currentDataTab==='today'?'今日':currentDataTab==='week'?'本周':'本月';

            // 计算统计数据
            const logs = getStudyLogData(periodDays);
            const totalMin = logs.reduce((s,l)=>s+l.minutes,0);
            const avgMin = periodDays>1?totalMin/periodDays:totalMin;
            const maxDay = logs.reduce((m,l)=>l.minutes>m.minutes?l:m,logs[0]||{minutes:0});
            const todayIdx = logs.length-1;
            const todayMin = logs[todayIdx]?.minutes||0;

            // 连续学习天数
            let streak = 0;
            for(let i=logs.length-1;i>=0;i--){ if(logs[i].minutes>0) streak++; else break; }

            // 本周学习天数
            const studyDays = logs.filter(l=>l.minutes>0).length;

            // 上月均值
            const lastMonthLogs = getStudyLogData(30);
            const lastMonthAvg = lastMonthLogs.reduce((s,l)=>s+l.minutes,0)/30;

            // 精力数据
            const energyData = getRecentEnergy(periodDays);

                    canvas.height = h;
                    ctx2.clearRect(0,0,w,h);
                    ctx2.fillStyle = '#1a1510';
                    ctx2.fillRect(0,0,w,h);
                    if(logs.length<2) return;
                    const maxM = Math.max(...logs.map(l=>l.minutes),60);
                    const stepX = (w-40)/Math.max(logs.length-1,1);
                    const drawLine = (data, color)=>{
                        ctx2.strokeStyle = color;
                        ctx2.lineWidth = 2;
                        ctx2.beginPath();
                        data.forEach((v,i)=>{
                            const x = 20 + i*stepX;
                            const y = h-20 - (v.minutes/maxM)*(h-40);
                            if(i===0) ctx2.moveTo(x,y);
                            else ctx2.lineTo(x,y);
                        });
                        ctx2.stroke();
                        ctx2.fillStyle = color;
                        data.forEach((v,i)=>{
                            const x = 20 + i*stepX;
                            const y = h-20 - (v.minutes/maxM)*(h-40);
                            ctx2.beginPath();
                            ctx2.arc(x,y,4,0,Math.PI*2);
                            ctx2.fill();
                        });
                    };
                    // 背景网格
                    ctx2.strokeStyle = '#3a3020';
                    ctx2.lineWidth = 0.5;
                    for(let i=0;i<5;i++){
                        const y = h-20 - i*(h-40)/4;
                        ctx2.beginPath(); ctx2.moveTo(20,y); ctx2.lineTo(w-20,y); ctx2.stroke();
                    }
                    drawLine(logs, '#d4a843');
                    // X轴标签
                    ctx2.fillStyle = '#a89474';
                    ctx2.font = '10px inherit';
                    ctx2.textAlign = 'center';
                    const showCount = Math.min(logs.length, 7);
                    const step = Math.floor(logs.length/showCount);
                    logs.forEach((l,i)=>{
                        if(i%step===0 || i===logs.length-1){
                            const x = 20 + i*stepX;
                            ctx2.fillText(l.dayStr.slice(5), x, h-5);
                        }
                    });
                }

                // 绘制精力曲线
                const canvasE = document.getElementById('chartEnergyCanvas');
                if(canvasE) {
                    const ctxE = canvasE.getContext('2d');
                    const wE = canvasE.offsetWidth || 600;
                    const hE = 140;
                    canvasE.width = wE;
                    canvasE.height = hE;
                    ctxE.clearRect(0,0,wE,hE);
                    ctxE.fillStyle = '#1a1510';
                    ctxE.fillRect(0,0,wE,hE);
                    if(energyData.length<2) return;
                    const maxE = 100;
                    const stepX = (wE-40)/Math.max(energyData.length-1,1);
                    ctxE.strokeStyle = '#3498db';
                    ctxE.lineWidth = 2;
                    ctxE.beginPath();
                    energyData.forEach((d,i)=>{
                        const x = 20 + i*stepX;
                        const y = hE-20 - (d.value/maxE)*(hE-40);
                        if(i===0) ctxE.moveTo(x,y);
                        else ctxE.lineTo(x,y);
                    });
                    ctxE.stroke();
                    ctxE.fillStyle = '#3498db';
                    energyData.forEach((d,i)=>{
                        const x = 20 + i*stepX;
                        const y = hE-20 - (d.value/maxE)*(hE-40);
                        ctxE.beginPath();
                        ctxE.arc(x,y,4,0,Math.PI*2);
                        ctxE.fill();
                    });
                    // 背景网格
                    ctxE.strokeStyle = '#3a3020';
                    ctxE.lineWidth = 0.5;
                    for(let i=0;i<5;i++){
                        const y = hE-20 - i*(hE-40)/4;
                        ctxE.beginPath(); ctxE.moveTo(20,y); ctxE.lineTo(wE-20,y); ctxE.stroke();
                    }
                }
            }, 10);
        }

        btnExitSystem.addEventListener('click', async ()=>{ await saveAllData(); await exportBackup(); showSummaryModal(); });

        function updateCanvasSize() {
            const rect=mapArea.getBoundingClientRect(); const dpr=window.devicePixelRatio||1;
            canvasWidth=rect.width; canvasHeight=rect.height;
            if(canvasWidth>0&&canvasHeight>0){ mapCanvas.width=canvasWidth*dpr; mapCanvas.height=canvasHeight*dpr; mapCanvas.style.width=canvasWidth+'px'; mapCanvas.style.height=canvasHeight+'px'; ctx.setTransform(1,0,0,1,0,0); ctx.scale(dpr,dpr); return true; }
            return false;
        }
        window.addEventListener('resize',()=>{ if(updateCanvasSize()) render(); });

        function init() {
            loadAllData();
            generateHexForBounds(getWorldBounds());
            if(!updateCanvasSize()){ setTimeout(()=>{ if(!updateCanvasSize()) window.addEventListener('load',()=>{ updateCanvasSize(); proceed(); }); else proceed(); },100); }
            else proceed();
        }
        function proceed() {
            renderArmyList(); updateTotalHours(); updateEnergy(); updateCountdown(); updateArmyDetailPanel();
            const bounds = getWorldBounds(); const worldW = bounds.width, worldH = bounds.height;
            let fitZoom = Math.min(canvasWidth / worldW, canvasHeight / worldH, 0.8);
            zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, fitZoom));
            cameraX = (bounds.minX + bounds.maxX) / 2; cameraY = (bounds.minY + bounds.maxY) / 2;
            clampCamera(); startAnimation(); render();
        }
        init();
    })();
</script>
</body>
</html>
